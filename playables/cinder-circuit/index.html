<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cinder Circuit</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="backdrop" aria-hidden="true">
      <div class="backdrop__grid"></div>
      <div class="backdrop__glow backdrop__glow--left"></div>
      <div class="backdrop__glow backdrop__glow--right"></div>
      <div class="backdrop__band"></div>
    </div>

    <main class="app-shell">
      <section id="title-screen" class="screen screen--active">
        <div class="hero-card">
          <section class="title-stack">
            <p class="eyebrow">START CORE</p>
            <h1>Cinder Circuit</h1>
            <div id="signature-cards" class="signature-grid"></div>
            <div class="hero-actions hero-actions--center">
              <button id="start-run" class="button button--primary" type="button">
                회로 투입
              </button>
            </div>
          </section>
        </div>
      </section>

      <section id="game-screen" class="screen hidden">
        <div class="layout layout--single">
          <main class="arena-panel">
            <div class="arena-frame">
              <div id="arena-stage" class="arena-stage">
                <canvas
                  id="game-canvas"
                  width="960"
                  height="540"
                  aria-label="Cinder Circuit game arena"
                ></canvas>

                <div class="hud-overlay hud-overlay--top">
                  <div class="hud-strip">
                    <div class="stat-chip stat-chip--overlay stat-chip--wave">
                      <span class="stat-chip__label">Wave</span>
                      <strong id="wave-label">Wave 1</strong>
                    </div>
                    <article id="hp-meter" class="meter-card meter-card--hp meter-card--overlay">
                      <div class="meter-card__head">
                        <span class="stat-chip__label">Hull</span>
                        <strong id="hp-stat">100 / 100</strong>
                      </div>
                      <div class="meter-card__bar">
                        <span id="hp-fill" class="meter-card__fill"></span>
                      </div>
                    </article>
                    <article id="heat-meter" class="meter-card meter-card--heat meter-card--overlay">
                      <div class="meter-card__head">
                        <span class="stat-chip__label">Heat</span>
                        <strong id="heat-stat">0%</strong>
                      </div>
                      <div class="meter-card__bar">
                        <span id="heat-fill" class="meter-card__fill"></span>
                      </div>
                    </article>
                    <article id="drive-meter" class="meter-card meter-card--drive meter-card--overlay">
                      <div class="meter-card__head">
                        <span class="stat-chip__label">Drive</span>
                        <strong id="drive-stat">0%</strong>
                      </div>
                      <div class="meter-card__bar">
                        <span id="drive-fill" class="meter-card__fill"></span>
                      </div>
                    </article>
                    <div class="stat-chip stat-chip--overlay">
                      <span class="stat-chip__label">Dash</span>
                      <strong id="dash-stat">2 / 2</strong>
                    </div>
                    <div class="stat-chip stat-chip--overlay">
                      <span class="stat-chip__label">Time</span>
                      <strong id="timer-stat">55.0s</strong>
                    </div>
                    <div class="stat-chip stat-chip--overlay">
                      <span class="stat-chip__label">고철</span>
                      <strong id="scrap-stat">0</strong>
                    </div>
                  </div>
                </div>

                <div class="hud-overlay hud-overlay--bottom">
                  <section class="build-panel build-panel--right">
                    <div id="wave-objective" class="status-card status-card--overlay"></div>
                  </section>
                </div>

                <div id="message-banner" class="message-banner hidden" role="status"></div>

                <div id="forge-overlay" class="forge-overlay hidden">
                  <div id="forge-panel" class="forge-overlay__panel">
                    <div id="forge-header" class="forge-overlay__header">
                      <p id="forge-eyebrow" class="panel__eyebrow">WAVE BREAK</p>
                      <h2>변이 선택</h2>
                      <p id="forge-subtitle" class="forge-overlay__copy">
                        세 장 중 하나를 고르면 바로 다음 웨이브로 들어간다.
                      </p>
                    </div>

                    <div id="forge-context" class="forge-context"></div>
                    <div id="forge-cards" class="forge-cards"></div>
                  </div>
                </div>

                <div id="pause-overlay" class="pause-overlay hidden">
                  <div class="pause-overlay__panel">
                    <p class="panel__eyebrow">SYSTEM HOLD</p>
                    <h2>회로 일시 정지</h2>
                    <p class="forge-overlay__copy">
                      전투 시뮬레이션을 잠시 멈췄다. 재개하거나 즉시 다시 투입할 수 있다.
                    </p>
                    <div class="pause-actions">
                      <button id="resume-run" class="button button--primary" type="button">
                        전투 재개
                      </button>
                      <button id="pause-restart" class="button button--ghost" type="button">
                        다시 투입
                      </button>
                      <button id="pause-title" class="button button--ghost" type="button">
                        타이틀로
                      </button>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </main>
        </div>
      </section>

      <section id="result-screen" class="screen hidden">
        <div class="result-card">
          <div class="result-layout">
            <section class="result-main">
              <p class="eyebrow">RUN REPORT</p>
              <h2 id="result-title">회로 봉인 성공</h2>
              <p id="result-copy" class="result-copy"></p>
              <div id="result-stats" class="result-grid"></div>
            </section>

            <aside class="result-side">
              <div id="result-build" class="status-card result-build"></div>
            </aside>
          </div>

          <div class="hero-actions">
            <button id="restart-run" class="button button--primary" type="button">
              다시 투입
            </button>
            <button id="back-to-title" class="button button--ghost" type="button">
              타이틀로
            </button>
          </div>
        </div>
      </section>
    </main>

    <script src="./game.js"></script>
  </body>
</html>
